<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <style>
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    a {
      color: #0ff;
      text-decoration: none;
      font-size: 24px;
      padding: 15px 30px;
      border: 2px solid #0ff;
      border-radius: 8px;
      margin: 10px;
      transition: all 0.3s;
    }
    a:hover {
      background: #0ff;
      color: #000;
    }
  </style>
</head>
<body>
  <h1>Game Template</h1>
  <a href="games/snake/">🐍 加速贪吃蛇</a>
</body>
</html>
