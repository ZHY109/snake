# Update Leaderboard Workflow
# Fetches score issues and updates leaderboard.json

name: Update Leaderboard

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  workflow_dispatch:      # 手动触发
  issues:
    types: [opened]       # 新 issue 创建时触发

permissions:
  contents: write
  issues: read

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SNAKE_TOKEN }}

      - name: Fetch and parse scores
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SNAKE_TOKEN }}
          script: |
            const fs = require('fs');

            // 获取所有带 snake-game 标签的 open issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'snake-game',
              per_page: 100
            });

            console.log(`Found ${issues.data.length} score issues`);

            // 解析每个 issue 的分数数据
            const scores = [];
            for (const issue of issues.data) {
              const body = issue.body || '';

              // 解析 markdown 表格
              const scoreMatch = body.match(/\| 分数 \| (\d+) \|/);
              const timeMatch = body.match(/\| 存活时间 \| ([\d.]+)s \|/);
              const speedMatch = body.match(/\| 最高速度 \| (\d+)% \|/);
              const uuidMatch = body.match(/\| UUID \| ([^\|]+) \|/);

              if (scoreMatch) {
                scores.push({
                  score: parseInt(scoreMatch[1]),
                  time: timeMatch ? parseFloat(timeMatch[1]) : 0,
                  maxSpeed: speedMatch ? parseInt(speedMatch[1]) : 100,
                  uuid: uuidMatch ? uuidMatch[1].trim() : 'unknown',
                  issueNumber: issue.number,
                  createdAt: issue.created_at
                });
              }
            }

            // 按分数排序（降序），分数相同按时间排序（降序）
            scores.sort((a, b) => {
              if (b.score !== a.score) return b.score - a.score;
              return b.time - a.time;
            });

            // 取前 50 名
            const leaderboard = scores.slice(0, 50).map((entry, index) => ({
              rank: index + 1,
              ...entry
            }));

            console.log(`Leaderboard has ${leaderboard.length} entries`);
            if (leaderboard.length > 0) {
              console.log(`Top score: ${leaderboard[0].score} by ${leaderboard[0].uuid}`);
            }

            // 写入 JSON 文件
            const data = {
              updatedAt: new Date().toISOString(),
              totalPlayers: scores.length,
              leaderboard: leaderboard
            };

            fs.writeFileSync('games/snake/leaderboard.json', JSON.stringify(data, null, 2));

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add games/snake/leaderboard.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard [skip ci]"
          git push
